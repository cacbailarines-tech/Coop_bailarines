{% extends 'base.html' %}
{% block page_title %}Aplicar Multa{% endblock %}
{% block content %}
<div style="max-width:480px;">
  <div style="margin-bottom:14px;"><a href="{% url 'multas_list' %}" style="color:var(--muted);text-decoration:none;font-size:13px;"><i class="fas fa-arrow-left"></i> Volver</a></div>
  <div class="card"><div class="card-header"><h5><i class="fas fa-exclamation-triangle" style="color:var(--danger);margin-right:7px;"></i>Aplicar Multa Manualmente</h5></div>
  <div class="card-body"><form method="post">{% csrf_token %}
    <div class="form-group"><label class="form-label">Tipo de Multa *</label>
      <select name="tipo_multa" class="form-control form-select" required>
        <option value="">Seleccionar...</option>
        {% for t in tipos %}<option value="{{ t.pk }}">{{ t.nombre }} — ${{ t.monto }} ({{ t.get_aplica_a_display }})</option>{% endfor %}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Socio *</label>
      <select name="socio" class="form-control form-select" required>
        <option value="">Seleccionar...</option>
        {% for s in socios %}<option value="{{ s.pk }}">{{ s.nombre_completo }} - {{ s.cedula }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Periodo *</label>
      <select name="periodo" class="form-control form-select" required>
        {% for p in periodos %}<option value="{{ p.pk }}">{{ p.anio }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Descripción adicional</label><input type="text" name="descripcion" class="form-control" placeholder="Detalle opcional"></div>
    <div class="alert alert-info" style="font-size:12px;"><i class="fas fa-info-circle"></i> Si el tipo de multa es <strong>"Por Libreta"</strong> y no selecciona una libreta específica, se aplicará a <strong>todas las libretas activas del socio</strong>.</div>
    <div style="display:flex;gap:10px;"><button type="submit" class="btn btn-warning"><i class="fas fa-exclamation-triangle"></i> Aplicar Multa</button><a href="{% url 'multas_list' %}" class="btn btn-outline">Cancelar</a></div>
  </form></div></div>
</div>{% endblock %}
