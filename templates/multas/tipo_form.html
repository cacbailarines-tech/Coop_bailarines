{% extends 'base.html' %}
{% block page_title %}Nuevo Tipo de Multa{% endblock %}
{% block content %}
<div style="max-width:440px;">
  <div style="margin-bottom:14px;"><a href="{% url 'tipos_multa_list' %}" style="color:var(--muted);text-decoration:none;font-size:13px;"><i class="fas fa-arrow-left"></i> Volver</a></div>
  <div class="card"><div class="card-header"><h5>Crear Tipo de Multa</h5></div>
  <div class="card-body"><form method="post">{% csrf_token %}
    <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" class="form-control" required placeholder="Ej: Cámara apagada en reunión"></div>
    <div class="form-group"><label class="form-label">Monto ($) *</label><input type="number" name="monto" class="form-control" min="0.01" step="0.01" required></div>
    <div class="form-group"><label class="form-label">Aplica a *</label>
      <select name="aplica_a" class="form-control form-select" required>
        <option value="socio">Por Socio (independiente de libretas)</option>
        <option value="libreta">Por Libreta (se multiplica por cantidad de libretas)</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Descripción</label><textarea name="descripcion" class="form-control" rows="2"></textarea></div>
    <div style="display:flex;gap:10px;"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Crear Tipo</button><a href="{% url 'tipos_multa_list' %}" class="btn btn-outline">Cancelar</a></div>
  </form></div></div>
</div>{% endblock %}
