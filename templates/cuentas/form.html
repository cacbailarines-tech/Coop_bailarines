{% extends 'base.html' %}
{% block title %}Nueva Cuenta de Ahorro{% endblock %}
{% block page_title %}Abrir Cuenta de Ahorro{% endblock %}
{% block content %}
<div style="max-width:600px;">
  <div style="margin-bottom:16px;">
    <a href="{% url 'cuentas_list' %}" style="color:var(--text-muted);text-decoration:none;font-size:13px;"><i class="fas fa-arrow-left"></i> Volver a Cuentas</a>
  </div>
  <div class="card">
    <div class="card-header">
      <h5><i class="fas fa-piggy-bank" style="color:var(--success);margin-right:8px;"></i>Nueva Cuenta de Ahorro</h5>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Socio *</label>
          <select name="socio" class="form-control form-select" required>
            <option value="">Seleccionar socio...</option>
            {% for s in socios %}
            <option value="{{ s.pk }}" {% if request.GET.socio == s.pk|stringformat:"s" %}selected{% endif %}>{{ s.nombre_completo }} - {{ s.cedula }}</option>
            {% endfor %}
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label class="form-label">Tipo de Cuenta *</label>
            <select name="tipo" class="form-control form-select" required>
              <option value="ahorro">Ahorro Normal</option>
              <option value="plazo">Ahorro a Plazo</option>
              <option value="infantil">Ahorro Infantil</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Depósito Inicial ($)</label>
            <input type="number" name="saldo_inicial" class="form-control" value="0" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Tasa de Interés Anual (%)</label>
            <input type="number" name="tasa_interes" class="form-control" value="0" min="0" step="0.01">
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button type="submit" class="btn btn-success"><i class="fas fa-piggy-bank"></i> Abrir Cuenta</button>
          <a href="{% url 'cuentas_list' %}" class="btn btn-outline">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
