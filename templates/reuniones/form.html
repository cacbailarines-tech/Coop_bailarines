{% extends 'base.html' %}
{% block page_title %}Nueva Reunión{% endblock %}
{% block content %}
<div style="max-width:440px;">
  <div style="margin-bottom:14px;"><a href="{% url 'reuniones_list' %}" style="color:var(--muted);text-decoration:none;font-size:13px;"><i class="fas fa-arrow-left"></i> Volver</a></div>
  <div class="card"><div class="card-header"><h5><i class="fas fa-video" style="color:var(--danger);margin-right:7px;"></i>Programar Reunión</h5></div>
  <div class="card-body"><form method="post">{% csrf_token %}
    <div class="form-group"><label class="form-label">Periodo *</label>
      <select name="periodo" class="form-control form-select" required>{% for p in periodos %}<option value="{{ p.pk }}">{{ p.anio }}</option>{% endfor %}</select>
    </div>
    <div class="form-group"><label class="form-label">Fecha de la Reunión *</label><input type="date" name="fecha" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Descripción</label><input type="text" name="descripcion" class="form-control" placeholder="Ej: Reunión mensual Enero 2026"></div>
    <div class="form-group">
      <label class="form-label">Link de la reunión (Teams)</label>
      <input type="url" name="link_reunion" class="form-control" placeholder="https://teams.microsoft.com/..." inputmode="url" autocomplete="url">
      <div class="form-text">Opcional. Pega aquí el enlace de Teams para que los socios lo vean.</div>
    </div>
    <div style="display:flex;gap:10px;"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Programar</button><a href="{% url 'reuniones_list' %}" class="btn btn-outline">Cancelar</a></div>
  </form></div></div>
</div>{% endblock %}
