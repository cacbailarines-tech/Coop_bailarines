<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cooperativa Bailarines - En Mantenimiento</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B3D91 0%, #1565C0 50%, #1976D2 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .container { text-align: center; padding: 40px 24px; max-width: 480px; }
    .logo {
      width: 140px; height: 140px;
      margin: 0 auto 32px;
      animation: pulse 2s ease-in-out infinite;
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3)); }
    .gear-container {
      display: flex; justify-content: center; gap: 16px;
      margin: 0 auto 24px; height: 60px;
    }
    .gear { animation: spin 4s linear infinite; }
    .gear:nth-child(2) { animation-direction: reverse; animation-duration: 3s; }
    .gear svg { width: 50px; height: 50px; fill: rgba(255,255,255,0.6); }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    p { font-size: 15px; opacity: 0.85; line-height: 1.5; margin-bottom: 32px; }
    .progress-bar {
      width: 100%; height: 4px; background: rgba(255,255,255,0.2);
      border-radius: 2px; overflow: hidden; margin: 0 auto;
    }
    .progress-fill {
      height: 100%; width: 30%; background: #fff; border-radius: 2px;
      animation: loading 2s ease-in-out infinite;
    }
    .status { font-size: 12px; opacity: 0.5; margin-top: 24px; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/static/img/logo.png" alt="Cooperativa Bailarines">
    </div>
    <h1>En Mantenimiento</h1>
