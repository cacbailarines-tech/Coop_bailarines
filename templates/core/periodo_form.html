{% extends 'base.html' %}
{% block page_title %}Nuevo Periodo{% endblock %}
{% block content %}
<div style="max-width:440px;">
  <div style="margin-bottom:14px;"><a href="{% url 'periodos_list' %}" style="color:var(--muted);text-decoration:none;font-size:13px;"><i class="fas fa-arrow-left"></i> Volver</a></div>
  <div class="card">
    <div class="card-header"><h5><i class="fas fa-calendar-alt" style="color:var(--primary);margin-right:7px;"></i>Crear Nuevo Periodo Anual</h5></div>
    <div class="card-body">
      <div class="alert alert-info"><i class="fas fa-info-circle"></i> Al crear el nuevo periodo, las libretas se registrarán individualmente cuando los socios se vayan inscribiendo.</div>
      <form method="post">{% csrf_token %}
        <div class="form-group"><label class="form-label">Año *</label>
          <input type="number" name="anio" class="form-control" value="2027" min="2020" max="2040" required style="font-size:24px;font-weight:800;text-align:center;">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group"><label class="form-label">Fecha de Inicio *</label><input type="date" name="fecha_inicio" class="form-control" required></div>
          <div class="form-group"><label class="form-label">Fecha de Cierre *</label><input type="date" name="fecha_cierre" class="form-control" required></div>
        </div>
        <div style="display:flex;align-items:center;gap:9px;padding:12px;background:rgba(0,137,123,0.06);border-radius:9px;margin-bottom:14px;">
          <input type="checkbox" name="activo" id="activo" checked style="width:16px;height:16px;">
          <label for="activo" style="font-size:13px;margin:0;font-weight:600;">Marcar como periodo activo (desactiva el periodo actual)</label>
        </div>
        <div class="form-group"><label class="form-label">Descripción</label><input type="text" name="descripcion" class="form-control" placeholder="Ej: Periodo anual 2027"></div>
        <div style="display:flex;gap:10px;"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Crear Periodo</button><a href="{% url 'periodos_list' %}" class="btn btn-outline">Cancelar</a></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
