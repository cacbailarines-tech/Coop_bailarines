{% extends 'base.html' %}
{% block title %}{{ accion }} Usuario{% endblock %}
{% block page_title %}{{ accion }} Usuario{% endblock %}
{% block content %}
<div style="max-width:520px;">
  <div style="margin-bottom:16px;">
    <a href="{% url 'usuarios_list' %}" style="color:var(--text-muted);text-decoration:none;font-size:13px;"><i class="fas fa-arrow-left"></i> Volver a Usuarios</a>
  </div>
  <div class="card">
    <div class="card-header">
      <h5><i class="fas fa-user-shield" style="color:var(--primary);margin-right:8px;"></i>{{ accion }} Usuario</h5>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label class="form-label">Nombre(s) *</label>
            <input type="text" name="first_name" class="form-control" value="{{ obj.first_name|default:'' }}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Apellido(s) *</label>
            <input type="text" name="last_name" class="form-control" value="{{ obj.last_name|default:'' }}" required>
          </div>
        </div>
        {% if accion == 'Crear' %}
        <div class="form-group">
          <label class="form-label">Nombre de usuario *</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        {% endif %}
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ obj.email|default:'' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña {% if accion == 'Editar' %}(dejar en blanco para mantener){% endif %}</label>
          <input type="password" name="password" class="form-control" {% if accion == 'Crear' %}required{% endif %}>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label class="form-label">Rol *</label>
            <select name="rol" class="form-control form-select" required>
              <option value="cajero" {% if obj.perfil.rol == 'cajero' %}selected{% endif %}>Cajero</option>
              <option value="tesorero" {% if obj.perfil.rol == 'tesorero' %}selected{% endif %}>Tesorero</option>
              <option value="gerente" {% if obj.perfil.rol == 'gerente' %}selected{% endif %}>Gerente</option>
              <option value="admin" {% if obj.perfil.rol == 'admin' %}selected{% endif %}>Administrador</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input type="tel" name="telefono" class="form-control" value="{% if obj.perfil %}{{ obj.perfil.telefono }}{% endif %}">
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> {{ accion }} Usuario</button>
          <a href="{% url 'usuarios_list' %}" class="btn btn-outline">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
